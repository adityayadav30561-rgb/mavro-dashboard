<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Spanbix is India's premier enterprise career learning platform — SAP training, campus partnerships, and placement readiness for commerce, MBA, and engineering graduates."
    />
    <meta name="theme-color" content="#102c56" />
    <meta name="application-name" content="Spanbix" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph defaults — page-level useSEO() overrides per route -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Spanbix" />
    <meta property="og:title" content="Spanbix — India's Premier Enterprise Career Learning Platform" />
    <meta
      property="og:description"
      content="Career transformation infrastructure for the SAP ecosystem. Mentor-led tracks, hands-on sandbox, and placement support — built for commerce, MBA, and engineering graduates."
    />
    <meta property="og:image" content="https://spanbix.com/spanbix/spanbix-blue.png" />
    <meta property="og:url" content="https://spanbix.com" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@spanbix" />
    <meta name="twitter:title" content="Spanbix — India's Premier Enterprise Career Learning Platform" />
    <meta
      name="twitter:description"
      content="Career transformation infrastructure for the SAP ecosystem. Mentor-led tracks, hands-on sandbox, and placement support."
    />
    <meta name="twitter:image" content="https://spanbix.com/spanbix/spanbix-blue.png" />

    <title>Spanbix — India's Premier Enterprise Career Learning Platform</title>

    <!-- Browser tab icon. Blue wordmark sits cleanly on the typical white tab. -->
    <link rel="icon" type="image/png" href="/spanbix/spanbix-blue.png" />
    <link rel="apple-touch-icon" href="/spanbix/spanbix-blue.png" />

    <!-- Typography: DM Serif Display (headlines) + Sora (UI) + JetBrains Mono (data) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=DM+Serif+Display:ital@0;1&family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <script>
      // No-flash theme bootstrap — Spanbix default is LIGHT (matches the
      // premium-cream brand language). Visitors can flip via the in-app
      // theme toggle, and that preference is persisted in localStorage.
      (function () {
        try {
          var saved = localStorage.getItem('mavro_theme');
          var dark = saved === 'dark';
          if (dark) document.documentElement.classList.add('dark');
        } catch (e) {
          // localStorage unavailable — default to light (no class on html).
        }
      })();
    </script>
  </head>
  <body class="font-sora antialiased">
    <div id="root"></div>
    <script type="module" src="/src/entries/spanbix.jsx"></script>
  </body>
</html>
