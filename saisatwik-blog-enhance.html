<!-- ============================================================================
  SaiSatwik Blog — Enhancement Block v2 (premium editorial design)
  ----------------------------------------------------------------------------
  WHERE TO PASTE: wp-admin -> Divi -> Theme Options -> Integration tab ->
  "Add code to the < head > of your blog" -> REPLACE the previous v1 block
  with this one -> Save. Hard-refresh a post (Ctrl+Shift+R).

  v2 changes vs v1:
  - Hero: wavy blue blob replaced by a flat premium navy gradient band with a
    subtle dot grid, eyebrow kicker above the title, tighter height
  - Quick Answer: navy slab replaced by an elegant key-takeaway card
    (small-caps kicker + lead paragraph + accent bar)
  - TOC: moved to the RIGHT of the content, only fades in after scrolling
    past the hero — no more overlap; hidden under 1440px viewports
  - Reading progress bar along the top of the viewport
  - Meta (category / comments / date) restyled as soft chips
============================================================================ -->

<style id="ss-blog-enhance">
:root{
  --ss-blue:#0b517c; --ss-blue-dark:#06283d; --ss-accent:#f97316;
  --ss-ink:#1f2933; --ss-muted:#52616b; --ss-line:#e4e9ee; --ss-soft:#f4f8fb;
}

/* ============================ HERO (section 0) ============================= */
/* Flatten the wavy blob into a premium navy band: gradient + faint dot grid.
   Kills any background image / shape dividers the template ships. */
body.single-post .et_pb_section_0_tb_body{
  background:
    radial-gradient(rgba(255,255,255,0.055) 1px, transparent 1.6px) 0 0 / 22px 22px,
    linear-gradient(118deg, var(--ss-blue-dark) 0%, var(--ss-blue) 62%, #0e6ba3 100%) !important;
  padding-top:118px !important;
  padding-bottom:64px !important;
}
body.single-post .et_pb_section_0_tb_body .et_pb_top_inside_divider,
body.single-post .et_pb_section_0_tb_body .et_pb_bottom_inside_divider{ display:none !important; }
body.single-post .et_pb_section_0_tb_body .et_pb_row{ width:92% !important; max-width:920px !important; }

/* Title */
body.single-post .et_pb_section_0_tb_body h1,
body.single-post .et_pb_section_0_tb_body .et_pb_text_0_tb_body h1,
body.single-post .et_pb_section_0_tb_body .et_pb_text_inner h1{
  color:#fff !important;
  font-size:clamp(1.9rem, 3.4vw, 2.7rem) !important;
  line-height:1.22 !important;
  font-weight:800 !important;
  letter-spacing:-0.01em;
  text-align:left !important;
  margin:0 !important;
  text-shadow:none !important;
}
/* Eyebrow kicker above the title */
body.single-post .et_pb_section_0_tb_body .et_pb_text_inner::before{
  content:"SAISATWIK · SAP INSIGHTS";
  display:inline-block;
  font-size:.68rem; font-weight:700; letter-spacing:.22em;
  color:#ffd9b8;
  background:rgba(255,255,255,.08);
  border:1px solid rgba(255,255,255,.18);
  border-radius:999px;
  padding:.45em 1.1em;
  margin-bottom:1.1em;
}
/* Thin accent rule under the hero */
body.single-post .et_pb_section_0_tb_body{ border-bottom:3px solid var(--ss-accent); }

/* ==================== META ROW (section 1: image + chips) ================== */
body.single-post .et_pb_section_1_tb_body{ padding-top:26px !important; padding-bottom:4px !important; }
body.single-post .et_pb_section_1_tb_body .et_pb_row{ width:92% !important; max-width:920px !important; }
body.single-post .et_pb_section_1_tb_body .et_pb_column_2_tb_body{
  display:flex; flex-wrap:wrap; gap:10px 12px; align-items:center;
}
body.single-post .et_pb_section_1_tb_body .et_pb_blurb{
  margin:0 !important; width:auto !important;
  background:var(--ss-soft);
  border:1px solid var(--ss-line);
  border-radius:999px;
  padding:.4em 1em !important;
}
body.single-post .et_pb_section_1_tb_body .et_pb_blurb_content{ max-width:none !important; display:flex; align-items:center; gap:.45em; }
body.single-post .et_pb_section_1_tb_body .et_pb_blurb .et_pb_blurb_container{ padding:0 !important; }
body.single-post .et_pb_section_1_tb_body .et_pb_blurb h4,
body.single-post .et_pb_section_1_tb_body .et_pb_blurb .et_pb_module_header,
body.single-post .et_pb_section_1_tb_body .et_pb_blurb .et_pb_module_header a{
  font-size:.78rem !important; color:var(--ss-blue-dark) !important; margin:0 !important; font-weight:600 !important;
}
body.single-post .et_pb_section_1_tb_body .et_pb_main_blurb_image{ margin-bottom:0 !important; width:auto !important; line-height:1; }
body.single-post .et_pb_section_1_tb_body .et_pb_main_blurb_image .et-pb-icon{ font-size:14px !important; color:var(--ss-accent) !important; }
/* Featured image (left column) */
body.single-post .et_pb_section_1_tb_body .et_pb_image img{ border-radius:14px; box-shadow:0 14px 40px -18px rgba(6,40,61,.45); }

/* ====================== READING PROGRESS BAR (top) ========================= */
#ss-progress{
  position:fixed; top:0; left:0; height:3px; width:0;
  background:linear-gradient(90deg, var(--ss-accent), #fdba74);
  z-index:100000; transition:width .08s linear; pointer-events:none;
}

/* ====================== ARTICLE BODY (unchanged core) ====================== */
body.single-post .et_pb_post_content{
  max-width:920px; margin-left:auto; margin-right:auto;
  color:var(--ss-ink); font-size:18px; line-height:1.78;
}
body.single-post .et_pb_post_content p{ margin:0 0 1.35em; color:var(--ss-ink); }

body.single-post .et_pb_post_content h2{
  font-size:1.68rem; line-height:1.3; font-weight:700; color:var(--ss-blue);
  margin:2.4em 0 .7em; padding-bottom:.35em; border-bottom:2px solid var(--ss-line);
}
body.single-post .et_pb_post_content h2::after{
  content:""; display:block; width:56px; height:3px; background:var(--ss-accent);
  margin-top:.5em; margin-bottom:-.53em; border-radius:2px;
}
body.single-post .et_pb_post_content h3{
  font-size:1.22rem; line-height:1.4; font-weight:700; color:var(--ss-blue-dark);
  margin:1.9em 0 .5em; padding-left:.7em; border-left:4px solid var(--ss-accent);
}
body.single-post .et_pb_post_content h4{
  font-size:1.06rem; font-weight:700; color:var(--ss-ink); margin:1.5em 0 .4em;
}

/* =============== QUICK ANSWER — elegant key-takeaway card ================== */
/* First H2 becomes a small-caps kicker; its paragraph becomes a lead card. */
body.single-post .et_pb_post_content h2:first-of-type{
  background:transparent; color:var(--ss-accent);
  font-size:.78rem; font-weight:800; letter-spacing:.22em; text-transform:uppercase;
  border:0; padding:0; margin:1.2em 0 .6em;
}
body.single-post .et_pb_post_content h2:first-of-type::after{ display:none; }
body.single-post .et_pb_post_content h2:first-of-type::before{
  content:"✦"; margin-right:.6em; color:var(--ss-accent);
}
body.single-post .et_pb_post_content h2:first-of-type + p{
  background:linear-gradient(180deg, #fbfdff 0%, var(--ss-soft) 100%);
  border:1px solid var(--ss-line);
  border-left:4px solid var(--ss-accent);
  border-radius:12px;
  padding:1.3em 1.5em;
  margin-top:0;
  font-size:1.13em; line-height:1.72;
  color:var(--ss-blue-dark);
  box-shadow:0 10px 30px -18px rgba(6,40,61,.25);
}

/* ---- Links / lists / emphasis --------------------------------------------- */
body.single-post .et_pb_post_content a{
  color:var(--ss-blue); text-decoration:underline; text-underline-offset:2px;
  text-decoration-color:rgba(11,81,124,.35); transition:color .15s,text-decoration-color .15s;
}
body.single-post .et_pb_post_content a:hover{ color:var(--ss-accent); text-decoration-color:var(--ss-accent); }
body.single-post .et_pb_post_content ul,
body.single-post .et_pb_post_content ol{ margin:0 0 1.5em; padding-left:1.4em; }
body.single-post .et_pb_post_content li{ margin-bottom:.6em; padding-left:.25em; }
body.single-post .et_pb_post_content ul li::marker{ color:var(--ss-accent); }
body.single-post .et_pb_post_content ol li::marker{ color:var(--ss-blue); font-weight:700; }
body.single-post .et_pb_post_content strong{ color:var(--ss-blue-dark); font-weight:700; }
body.single-post .et_pb_post_content blockquote{
  border-left:4px solid var(--ss-accent); background:var(--ss-soft); margin:1.6em 0;
  padding:.9em 1.2em; border-radius:0 8px 8px 0; color:var(--ss-muted); font-style:normal;
}

/* ---- Tables --------------------------------------------------------------- */
body.single-post .et_pb_post_content .wp-block-table{
  margin:1.8em 0; overflow-x:auto; -webkit-overflow-scrolling:touch; border-radius:12px;
  border:1px solid var(--ss-line);
  box-shadow:0 1px 2px rgba(15,40,60,.05),0 12px 28px -18px rgba(15,40,60,.22);
}
body.single-post .et_pb_post_content table{
  width:100%; border-collapse:collapse; font-size:.95rem; line-height:1.55; background:#fff; margin:0;
}
body.single-post .et_pb_post_content table thead th{
  background:var(--ss-blue-dark); color:#fff; text-align:left; font-weight:700;
  padding:.9em 1em; font-size:.85rem; letter-spacing:.02em; text-transform:uppercase; border:0;
}
body.single-post .et_pb_post_content table td{
  padding:.85em 1em; border-top:1px solid var(--ss-line); color:var(--ss-ink); vertical-align:top;
}
body.single-post .et_pb_post_content table tbody tr:nth-child(even) td{ background:var(--ss-soft); }
body.single-post .et_pb_post_content table tbody tr:hover td{ background:#eef5fa; }
body.single-post .et_pb_post_content table td:first-child{ font-weight:600; }
body.single-post .et_pb_post_content table td strong{ color:var(--ss-blue-dark); }

/* ---- Images --------------------------------------------------------------- */
body.single-post .et_pb_post_content img{ border-radius:10px; }
body.single-post .wp-block-image{ margin:1.8em 0; }

/* ================= STICKY TOC v2 — right side, post-hero =================== */
#ss-toc{
  position:fixed; top:140px;
  left:calc(50% + 490px);
  width:246px; max-height:calc(100vh - 220px);
  overflow-y:auto; padding:16px 18px;
  background:rgba(255,255,255,.92); backdrop-filter:blur(8px);
  border:1px solid var(--ss-line); border-radius:14px;
  box-shadow:0 14px 40px -20px rgba(6,40,61,.35);
  z-index:90; font-size:.82rem; line-height:1.45;
  opacity:0; transform:translateY(10px); pointer-events:none;
  transition:opacity .3s ease, transform .3s ease;
}
#ss-toc.ss-vis{ opacity:1; transform:translateY(0); pointer-events:auto; }
#ss-toc .ss-toc-title{
  font-size:.66rem; letter-spacing:.18em; text-transform:uppercase; font-weight:800;
  color:var(--ss-accent); margin-bottom:10px;
}
#ss-toc a{
  display:block; padding:5px 0 5px 11px; color:var(--ss-muted); text-decoration:none;
  border-left:2px solid var(--ss-line); transition:color .15s,border-color .15s;
}
#ss-toc a:hover{ color:var(--ss-blue); }
#ss-toc a.ss-active{ color:var(--ss-blue); border-left-color:var(--ss-accent); font-weight:600; }
/* Only show where there is real free space beside the 920px column */
@media (max-width:1439px){ #ss-toc{ display:none !important; } }

/* ===================== CTA banner (after the article) ====================== */
.ss-cta{
  max-width:920px; margin:2.6em auto 0;
  background:
    radial-gradient(rgba(255,255,255,0.05) 1px, transparent 1.6px) 0 0 / 20px 20px,
    linear-gradient(118deg, var(--ss-blue-dark), var(--ss-blue));
  color:#fff; border-radius:16px; padding:2.1em 2.3em; display:flex; flex-wrap:wrap;
  align-items:center; gap:1.2em;
  border:1px solid rgba(255,255,255,.08);
  box-shadow:0 18px 44px -20px rgba(6,40,61,.65);
}
.ss-cta-text{ flex:1 1 320px; }
.ss-cta-text h3{ margin:0 0 .3em; color:#fff; font-size:1.35rem; font-weight:800; border:0; padding:0; }
.ss-cta-text p{ margin:0; color:rgba(255,255,255,.82); font-size:.98rem; }
.ss-cta a.ss-cta-btn{
  background:var(--ss-accent); color:#fff; text-decoration:none; font-weight:700;
  padding:.9em 1.7em; border-radius:10px; white-space:nowrap; transition:transform .15s,box-shadow .15s;
  box-shadow:0 8px 22px -8px rgba(249,115,22,.75);
}
.ss-cta a.ss-cta-btn:hover{ transform:translateY(-2px); box-shadow:0 12px 28px -8px rgba(249,115,22,.9); }

/* ---- Responsive ----------------------------------------------------------- */
@media (max-width:782px){
  body.single-post .et_pb_section_0_tb_body{ padding-top:96px !important; padding-bottom:44px !important; }
  body.single-post .et_pb_post_content{ font-size:17px; }
  body.single-post .et_pb_post_content h2{ font-size:1.42rem; }
  body.single-post .et_pb_post_content h3{ font-size:1.12rem; }
  body.single-post .et_pb_post_content h2:first-of-type + p{ font-size:1.05em; padding:1.1em 1.2em; }
  body.single-post .et_pb_post_content table{ font-size:.9rem; }
  .ss-cta{ padding:1.6em; }
}
</style>

<script id="ss-blog-enhance-js">
(function(){
  function ready(fn){
    if(document.readyState!=='loading') fn();
    else document.addEventListener('DOMContentLoaded', fn);
  }
  ready(function(){
    if(!document.body.classList.contains('single-post')) return;
    var content = document.querySelector('.et_pb_post_content');
    if(!content) return;

    /* ---- Reading progress bar ---- */
    var bar = document.createElement('div');
    bar.id = 'ss-progress';
    document.body.appendChild(bar);

    /* ---- Sticky TOC (right side, appears after the hero) ---- */
    var toc = null;
    var heads = Array.prototype.slice.call(content.querySelectorAll('h2'));
    if(heads.length >= 3){
      toc = document.createElement('nav');
      toc.id = 'ss-toc';
      toc.innerHTML = '<div class="ss-toc-title">On this page</div>';
      heads.forEach(function(h, i){
        if(!h.id){
          h.id = 'sec-' + (h.textContent.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'') || ('s'+i));
        }
        var a = document.createElement('a');
        a.href = '#' + h.id;
        a.textContent = h.textContent;
        a.addEventListener('click', function(e){
          e.preventDefault();
          var t = document.getElementById(h.id);
          if(t) window.scrollTo({ top: t.getBoundingClientRect().top + window.pageYOffset - 110, behavior:'smooth' });
        });
        toc.appendChild(a);
      });
      document.body.appendChild(toc);

      var links = Array.prototype.slice.call(toc.querySelectorAll('a'));
      var byId = {};
      links.forEach(function(l){ byId[l.getAttribute('href').slice(1)] = l; });
      if('IntersectionObserver' in window){
        var obs = new IntersectionObserver(function(entries){
          entries.forEach(function(en){
            if(en.isIntersecting){
              links.forEach(function(l){ l.classList.remove('ss-active'); });
              var act = byId[en.target.id];
              if(act) act.classList.add('ss-active');
            }
          });
        }, { rootMargin: '-100px 0px -70% 0px' });
        heads.forEach(function(h){ obs.observe(h); });
      }
    }

    /* ---- Scroll driver: progress width + TOC visibility past the hero ---- */
    var contentTop = 0;
    function measure(){
      var r = content.getBoundingClientRect();
      contentTop = r.top + window.pageYOffset;
    }
    measure();
    window.addEventListener('resize', measure);
    function onScroll(){
      var doc = document.documentElement;
      var max = doc.scrollHeight - window.innerHeight;
      bar.style.width = (max > 0 ? (window.pageYOffset / max) * 100 : 0) + '%';
      if(toc){
        if(window.pageYOffset > contentTop - 180) toc.classList.add('ss-vis');
        else toc.classList.remove('ss-vis');
      }
    }
    window.addEventListener('scroll', onScroll, { passive:true });
    onScroll();

    /* ---- CTA banner after the article ---- */
    if(!document.querySelector('.ss-cta')){
      var cta = document.createElement('div');
      cta.className = 'ss-cta';
      cta.innerHTML =
        '<div class="ss-cta-text">' +
          '<h3>Planning an SAP project?</h3>' +
          '<p>Talk to the SaiSatwik SAP team about your EPPM, PS, or S/4HANA roadmap. No obligation, straight answers.</p>' +
        '</div>' +
        '<a class="ss-cta-btn" href="https://saisatwik.com/contact-us/">Talk to our SAP team</a>';
      content.parentNode.insertBefore(cta, content.nextSibling);
    }
  });
})();
</script>
