# =============================================
# Mavro Admin — Nginx Configuration
# =============================================
# Place in: /etc/nginx/sites-available/mavro-admin
# Enable:   sudo ln -s /etc/nginx/sites-available/mavro-admin /etc/nginx/sites-enabled/
# Test:     sudo nginx -t
# Reload:   sudo systemctl reload nginx
# =============================================

# Rate limiting zone (shared across workers)
limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=auth:10m rate=3r/s;

# Upstream (PM2 cluster on port 5000)
upstream mavro_backend {
    server 127.0.0.1:5000;
    keepalive 64;
}

# --- HTTP → HTTPS redirect ---
server {
    listen 80;
    listen [::]:80;
    server_name admin.mavro.com;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- Main HTTPS Server ---
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.mavro.com;

    # ---- SSL (Let's Encrypt / Certbot) ----
    ssl_certificate /etc/letsencrypt/live/admin.mavro.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.mavro.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ---- Security Headers ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ---- Gzip (supplement Node.js compression) ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    # ---- Request Size Limits ----
    client_max_body_size 10m;

    # ---- API Proxy ----
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        proxy_pass http://mavro_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ---- Auth API (stricter rate limit) ----
    location /api/auth/login {
        limit_req zone=auth burst=5 nodelay;

        proxy_pass http://mavro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ---- Sitemap & Robots (cached heavily) ----
    location /sitemap/ {
        proxy_pass http://mavro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 1h;
    }

    location /robots/ {
        proxy_pass http://mavro_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_cache_valid 200 24h;
    }

    # ---- Frontend Static Files ----
    location / {
        root /var/www/mavro-admin/client/dist;
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ---- Block sensitive paths ----
    location ~ /\. {
        deny all;
    }
    location ~ /(node_modules|\.env|\.git) {
        deny all;
        return 404;
    }
}
